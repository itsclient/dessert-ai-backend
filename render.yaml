services:
  - type: web
    name: dessert-ai-backend
    runtime: docker
    repo: https://github.com/yourusername/dessert-ai
    branch: main
    plan: free
    healthCheckPath: /api/admin/stats
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    autoDeploy: true
